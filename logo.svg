<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="wire" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="wireText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>

  <!-- Engineering grid background -->
  <g stroke="#06B6D4" stroke-width="0.5" opacity="0.12">
    <path d="M0 20 H800 M0 50 H800 M0 80 H800 M0 110 H800 M0 140 H800 M0 170 H800 M0 200 H800"/>
    <path d="M50 0 V220 M130 0 V220 M210 0 V220 M290 0 V220 M370 0 V220 M450 0 V220 M530 0 V220 M610 0 V220 M690 0 V220 M770 0 V220"/>
  </g>

  <!-- 3D wireframe Möbius (stacked infinities suggesting depth) -->
  <g transform="translate(70, 80)" fill="none">
    <!-- Back layer (depth) -->
    <g stroke="url(#wire)" stroke-width="1" opacity="0.25">
      <ellipse cx="50" cy="30" rx="42" ry="29" transform="translate(-5, -7)"/>
      <ellipse cx="170" cy="30" rx="42" ry="29" transform="translate(5, -7)"/>
      <line x1="93" y1="13" x2="127" y2="47" transform="translate(0, -7)"/>
    </g>
    <!-- Mid-back -->
    <g stroke="url(#wire)" stroke-width="1" opacity="0.4">
      <ellipse cx="50" cy="30" rx="42" ry="29" transform="translate(-3, -4)"/>
      <ellipse cx="170" cy="30" rx="42" ry="29" transform="translate(3, -4)"/>
      <line x1="93" y1="13" x2="127" y2="47" transform="translate(0, -4)"/>
    </g>
    <!-- Mid-front -->
    <g stroke="url(#wire)" stroke-width="1.5" opacity="0.7">
      <ellipse cx="50" cy="30" rx="42" ry="29" transform="translate(-1, -2)"/>
      <ellipse cx="170" cy="30" rx="42" ry="29" transform="translate(1, -2)"/>
      <line x1="93" y1="13" x2="127" y2="47" transform="translate(0, -2)"/>
    </g>
    <!-- Front layer -->
    <g stroke="url(#wire)" stroke-width="2.5">
      <ellipse cx="50" cy="30" rx="42" ry="29"/>
      <ellipse cx="170" cy="30" rx="42" ry="29"/>
      <line x1="93" y1="13" x2="127" y2="47" stroke-linecap="round"/>
    </g>
    <!-- Crisp outlines on top -->
    <g stroke="#22D3EE" stroke-width="1" opacity="0.9">
      <ellipse cx="50" cy="30" rx="44" ry="31"/>
      <ellipse cx="170" cy="30" rx="44" ry="31"/>
    </g>
    <!-- Vertex points -->
    <g fill="#22D3EE">
      <circle cx="50" cy="30" r="2"/>
      <circle cx="170" cy="30" r="2"/>
      <circle cx="93" cy="13" r="1.5"/>
      <circle cx="127" cy="47" r="1.5"/>
    </g>
  </g>

  <!-- MÖBIUS text in wireframe -->
  <text x="280" y="115" font-size="56" font-weight="900" fill="url(#wireText)" letter-spacing="6">MÖBIUS</text>
  <text x="280" y="142" font-size="11" font-weight="700" fill="#06B6D4" letter-spacing="4" opacity="0.75">// AGENTICOS · v1.0 · BUILD 2026.06</text>
  <text x="280" y="158" font-size="10" font-weight="400" fill="#22D3EE" letter-spacing="3" opacity="0.55">[ ALWAYS_ON ][ SELF_EVOLVING ][ MULTI_AGENT ]</text>

  <!-- Corner brackets -->
  <g stroke="#06B6D4" stroke-width="2" fill="none">
    <path d="M10 10 H35 M10 10 V35"/>
    <path d="M790 10 H765 M790 10 V35"/>
    <path d="M10 210 H35 M10 185 V210"/>
    <path d="M790 210 H765 M790 185 V210"/>
  </g>

  <!-- Scale ticks (left edge) -->
  <g stroke="#06B6D4" stroke-width="1" opacity="0.5">
    <line x1="42" y1="40" x2="50" y2="40"/>
    <line x1="42" y1="80" x2="50" y2="80"/>
    <line x1="42" y1="120" x2="50" y2="120"/>
    <line x1="42" y1="160" x2="50" y2="160"/>
  </g>

  <!-- Coordinate annotation -->
  <text x="55" y="200" font-size="9" fill="#06B6D4" opacity="0.6" font-family="monospace">u:[0,2π] · v:[-1,1] · MÖBIUS_TOPOLOGY</text>
</svg>
